<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic Demo - AI 漫剧创作助手</title>
    <meta name="description" content="基于 AI 驱动的自动化漫剧创作系统，从剧本到视频一站式完成。">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
        <div class="logo">
            <i class="fas fa-film"></i>
        </div>
        <div class="nav-item active" data-view="chat">
            <i class="fas fa-comments"></i>
            <span>对话</span>
        </div>
        <div class="nav-item" data-view="storyboard">
            <i class="fas fa-layer-group"></i>
            <span>分镜</span>
        </div>
        <div class="nav-item" data-view="gallery">
            <i class="fas fa-images"></i>
            <span>作品库</span>
        </div>
        <div class="sidebar-spacer"></div>
        <div class="nav-item" data-view="settings">
            <i class="fas fa-cog"></i>
            <span>设置</span>
        </div>
    </nav>

    <!-- Main Chat Area -->
    <main class="main-content">

        <!-- Top Bar -->
        <header class="top-bar">
            <div class="top-bar-left">
                <h1 class="app-title">Comic Demo</h1>
                <span class="connection-badge" id="connectionBadge">
                    <span class="status-dot"></span>
                    <span class="status-text">未连接</span>
                </span>
            </div>
            <div class="top-bar-right">
                <button class="icon-btn" id="newChatBtn" title="新对话">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </header>

        <!-- Chat Messages Container -->
        <div class="chat-container" id="chatContainer">

            <!-- Welcome Message (shown when chat is empty) -->
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-icon">
                    <i class="fas fa-wand-magic-sparkles"></i>
                </div>
                <h2>欢迎使用 Comic Demo</h2>
                <p>AI 驱动的漫剧创作代理，从剧本到视频一站式完成。</p>

                <div class="quick-actions">
                    <button class="quick-action-btn" data-prompt="帮我创作一个赛博朋克风格的短篇漫画，主角是一个机械师">
                        <i class="fas fa-robot"></i>
                        <span>赛博朋克漫画</span>
                    </button>
                    <button class="quick-action-btn" data-prompt="创作一个古风武侠漫剧，包含3个主要场景和2个角色">
                        <i class="fas fa-yin-yang"></i>
                        <span>古风武侠漫剧</span>
                    </button>
                    <button class="quick-action-btn" data-prompt="设计一个校园爱情故事的漫画分镜，温馨治愈风格">
                        <i class="fas fa-heart"></i>
                        <span>校园爱情故事</span>
                    </button>
                    <button class="quick-action-btn" data-prompt="创作一个太空探险主题的科幻漫剧视频">
                        <i class="fas fa-rocket"></i>
                        <span>太空探险科幻</span>
                    </button>
                </div>

                <div class="test-actions"
                    style="margin-top: 1.5rem; display: flex; gap: 1rem; justify-content: center;">
                    <button class="test-action-btn" data-test="test_llm" title="测试 DeepSeek LLM">
                        <i class="fas fa-brain"></i> 测试 LLM
                    </button>
                    <button class="test-action-btn" data-test="test_image_llm" title="测试 Seedream 生图">
                        <i class="fas fa-image"></i> 测试 Image LLM
                    </button>
                    <button class="test-action-btn" data-test="test_video_llm" title="测试 Seedance 生视频">
                        <i class="fas fa-video"></i> 测试 Video LLM
                    </button>
                </div>

                <!-- Pipeline Info -->
                <div class="pipeline-info">
                    <h3>创作流水线</h3>
                    <div class="pipeline-nodes">
                        <div class="pipeline-node"><i class="fas fa-scroll"></i><span>剧本</span></div>
                        <div class="pipeline-arrow"><i class="fas fa-chevron-right"></i></div>
                        <div class="pipeline-node"><i class="fas fa-palette"></i><span>风格</span></div>
                        <div class="pipeline-arrow"><i class="fas fa-chevron-right"></i></div>
                        <div class="pipeline-node"><i class="fas fa-user-astronaut"></i><span>角色</span></div>
                        <div class="pipeline-arrow"><i class="fas fa-chevron-right"></i></div>
                        <div class="pipeline-node"><i class="fas fa-th-large"></i><span>分镜</span></div>
                        <div class="pipeline-arrow"><i class="fas fa-chevron-right"></i></div>
                        <div class="pipeline-node"><i class="fas fa-image"></i><span>生图</span></div>
                        <div class="pipeline-arrow"><i class="fas fa-chevron-right"></i></div>
                        <div class="pipeline-node"><i class="fas fa-video"></i><span>视频</span></div>
                    </div>
                </div>
            </div>

            <!-- Messages will be appended here by JS -->
        </div>

        <!-- Input Bar (always at bottom) -->
        <div class="input-bar">
            <div class="input-wrapper">
                <textarea id="chatInput" placeholder="描述你的漫剧构思..." rows="1" autocomplete="off"></textarea>
                <button id="sendBtn" class="send-btn" disabled>
                    <i class="fas fa-arrow-up"></i>
                </button>
            </div>
            <div class="input-footer-text">
                Comic Demo 基于 AI 代理，创作结果可能需要数分钟
            </div>
        </div>

    </main>

    <script src="app.js"></script>
</body>

</html>
